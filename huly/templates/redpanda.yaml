{{- if .Values.redpanda.enabled }}
{{- $fullname := include "huly.fullname" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-redpanda
  labels:
    {{- include "huly.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
spec:
  serviceName: {{ $fullname }}-redpanda
  replicas: 1
  selector:
    matchLabels:
      {{- include "huly.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redpanda
  template:
    metadata:
      labels:
        {{- include "huly.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redpanda
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 101
      containers:
        - name: redpanda
          image: "{{ .Values.redpanda.image.repository }}:{{ .Values.redpanda.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - rpk
            - redpanda
            - start
            - --mode
            - dev-container
            - --smp
            - "1"
            - --kafka-addr
            - "0.0.0.0:9092"
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
          resources:
            {{- toYaml .Values.redpanda.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
            - name: config
              mountPath: /etc/redpanda
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redpanda.storage.storageClassName }}
        storageClassName: {{ .Values.redpanda.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redpanda.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-redpanda
  labels:
    {{- include "huly.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: kafka
      protocol: TCP
      name: kafka
  selector:
    {{- include "huly.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
{{- end }}
